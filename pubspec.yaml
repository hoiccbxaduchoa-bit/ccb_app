name: ccb_mobile_chutich
description: Quan ly Hoi CCB - Chu tich xa

version: 2.0.0

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  url_launcher: ^6.2.6
  sqflite: ^2.3.0
  path: ^1.9.0
  path_provider: ^2.1.2
  flutter_pdfview: ^1.3.2

  image_picker: ^1.0.7
  shared_preferences: ^2.2.2

  file_picker: ^8.0.0
  archive: ^3.4.10
  open_filex: ^4.3.2
  excel: ^2.1.0
  flutter_launcher_icons: ^0.13.1
  pdf: ^3.10.8
  printing: ^5.12.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo_ccb.png
    - assets/vanban/phap_lenh_ccb.pdf
    - assets/vanban/dieu_le_hoi_ccb.pdf
    - assets/vanban/huong_dan_thi_hanh.pdf
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo_ccb.png"
  adaptive_icon_background: "#ffffff"